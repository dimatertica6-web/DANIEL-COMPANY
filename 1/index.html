<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS forum — максимальное сообщество</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-gradient: linear-gradient(145deg, #0B1E30 0%, #071928 100%);
            --surface: rgba(12, 28, 45, 0.85);
            --surface-lighter: rgba(20, 40, 62, 0.9);
            --accent-primary: #2F6FA0;
            --text-main: #E0EFFA;
            --text-muted: #9FB5D0;
            --card-bg: rgba(10, 25, 42, 0.8);
            --input-bg: rgba(6, 18, 30, 0.8);
            --shadow-heavy: 0 20px 40px -20px #000000, 0 0 0 1px rgba(50, 110, 180, 0.2);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            backdrop-filter: blur(2px);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px 12px;
        }

        .forum-container {
            max-width: 1100px;
            width: 100%;
            background: var(--surface);
            backdrop-filter: blur(14px);
            border-radius: 48px 48px 40px 40px;
            padding: 32px 32px 40px;
            box-shadow: var(--shadow-heavy), inset 0 1px 2px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(70, 130, 200, 0.2);
        }

        /* Шапка */
        .forum-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
        }

        .title-section h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #C0E0F5;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .title-section i {
            color: #2F6FA0;
            font-size: 2.2rem;
            margin-right: 12px;
        }

        .stats-badge {
            background: var(--surface-lighter);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid rgba(80, 140, 210, 0.2);
            display: flex;
            gap: 28px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        .stat-item i {
            color: #2F6FA0;
            font-size: 1.4rem;
        }

        .stat-item span:last-child {
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* Панель создания с тулбаром */
        .compose-panel {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(70, 130, 200, 0.2);
            backdrop-filter: blur(10px);
        }

        .compose-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .avatar-placeholder {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #1A3F60, #0E2C48);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2F6FA0;
            box-shadow: 0 0 0 2px rgba(47, 111, 160, 0.2);
        }

        .avatar-placeholder i {
            font-size: 2rem;
            color: #B0D0EA;
        }

        /* Тулбар форматирования */
        .format-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #1F4B70;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: #9FB8D5;
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn:hover {
            background: #1F4B70;
            color: white;
        }

        .tool-btn i {
            font-size: 1.1rem;
        }

        .input-wrapper {
            background: var(--input-bg);
            border-radius: 44px;
            padding: 4px 4px 4px 24px;
            border: 1px solid #1F4B70;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            padding: 16px 8px 16px 0;
            font-size: 1rem;
            color: white;
            width: 100%;
            outline: none;
        }

        .input-wrapper button {
            background: #1A4F78;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 10px -8px #000;
            border: 1px solid #2F6FA0;
        }

        .input-wrapper button:hover {
            background: #2369A0;
        }

        /* Загрузчик изображений */
        .image-upload-area {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .upload-btn {
            background: #1F3F60;
            border: 1px dashed #2F6FA0;
            color: #B0D0EA;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s;
        }

        .upload-btn:hover {
            background: #2A5080;
            border-color: #3A7DB0;
        }

        #imagePreview {
            max-height: 60px;
            max-width: 100px;
            border-radius: 16px;
            border: 2px solid #2F6FA0;
            object-fit: cover;
        }

        /* Фильтры */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1F3F60;
            padding-bottom: 18px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn.active {
            background: #1F3F60;
            color: white;
            box-shadow: inset 0 2px 3px #0A1A2A, 0 2px 5px #0F2A40;
        }

        /* Лента */
        .messages-feed {
            display: flex;
            flex-direction: column;
            gap: 22px;
            margin-top: 6px;
        }

        /* Карточка сообщения */
        .message-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(70, 130, 200, 0.2);
            transition: 0.2s;
        }

        .message-card:hover {
            border-color: rgba(80, 140, 220, 0.4);
            background: rgba(15, 35, 55, 0.85);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .msg-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(45deg, #1A3F60, #0E2C48);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2F6FA0;
        }

        .msg-author {
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .badge-pro {
            background: #1A4F78;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 50px;
            color: #B0D0EA;
            border: 1px solid #2F6FA0;
            margin-left: 8px;
        }

        .msg-time {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Контент с форматированием */
        .message-content {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #E0EFFA;
            padding-left: 64px;
            word-break: break-word;
        }

        .message-content strong {
            color: white;
            font-weight: 700;
        }

        .message-content pre, .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: #0D1F30;
            padding: 4px 8px;
            border-radius: 10px;
            border: 1px solid #1F4B70;
            color: #D0E8FA;
        }

        .message-content pre {
            padding: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .message-content blockquote {
            border-left: 4px solid #2F6FA0;
            background: rgba(47, 111, 160, 0.1);
            padding: 8px 16px;
            margin: 8px 0;
            border-radius: 12px;
            color: #C0DCF5;
        }

        .message-content img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 20px;
            margin: 10px 0;
            border: 2px solid #2F6FA0;
            object-fit: contain;
            background: #0A1A2A;
        }

        /* действия */
        .message-actions {
            display: flex;
            gap: 16px;
            padding-left: 64px;
            margin-top: 16px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }

        .action-btn.like:hover { background: rgba(160, 70, 100, 0.15); color: #E68AAC; }
        .action-btn.delete:hover { background: rgba(200, 70, 70, 0.15); color: #E07A7A; }

        .empty-forum {
            text-align: center;
            padding: 70px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 60px;
            border: 2px dashed #1F4B70;
        }

        .empty-forum i { font-size: 5rem; color: #1F4B70; }
        .forum-footer {
            margin-top: 40px;
            text-align: center;
            color: #6F95B5;
            border-top: 1px solid #1F3F60;
            padding-top: 28px;
        }

        @media (max-width: 650px) {
            .message-content { padding-left: 0; }
            .message-actions { padding-left: 0; }
        }
    </style>
</head>
<body>
<div class="forum-container">
    <!-- шапка -->
    <div class="forum-header">
        <div class="title-section">
            <h1><i class="fas fa-bolt"></i> SRS forum</h1>
            <div style="color: #7F9FBF;"><i class="fas fa-globe"></i> real‑time · максимальное сообщество</div>
        </div>
        <div class="stats-badge">
            <div class="stat-item"><i class="fas fa-users"></i> онлайн <span id="onlineCount">311</span></div>
            <div class="stat-item"><i class="fas fa-pen-fancy"></i> сообщений <span id="totalMessages">0</span></div>
        </div>
    </div>

    <!-- панель создания -->
    <div class="compose-panel">
        <div class="compose-header">
            <div class="avatar-placeholder"><i class="fas fa-user-astronaut"></i></div>
            <div style="flex:1">
                <!-- тулбар форматирования -->
                <div class="format-toolbar">
                    <button class="tool-btn" id="formatBold" title="Жирный текст"><i class="fas fa-bold"></i> <span style="font-family: monospace;">**текст**</span></button>
                    <button class="tool-btn" id="formatCode" title="Моноширный (code)"><i class="fas fa-code"></i> <span style="font-family: monospace;">`код`</span></button>
                    <button class="tool-btn" id="formatBlockquote" title="Цитата"><i class="fas fa-quote-right"></i> > цитата</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Ваша мысль, используйте **жирный**, `код`, > цитата ... (Enter отправить)">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i> Отправить</button>
                </div>
            </div>
        </div>
        
        <!-- загрузка изображений -->
        <div class="image-upload-area">
            <label for="imageUpload" class="upload-btn"><i class="fas fa-image"></i> Загрузить изображение</label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            <img id="imagePreview" src="#" alt="превью" style="display: none;">
            <span id="imageName" style="color:#7F9FBF;"></span>
        </div>
        <div style="margin-left: 68px; font-size: 0.8rem; color: #5F7F9F; margin-top: 12px;">
            <i class="fas fa-database"></i> данные сохраняются · поддерживаются **жирный**, `код`, > цитаты и картинки
        </div>
    </div>

    <!-- фильтры -->
    <div class="filter-bar">
        <button class="filter-btn active" id="filterAll"><i class="fas fa-layer-group"></i> Все</button>
        <button class="filter-btn" id="filterPopular"><i class="fas fa-fire"></i> Популярные (лайки > 2)</button>
        <button class="filter-btn" id="filterMyPosts"><i class="fas fa-user-circle"></i> Мои</button>
    </div>

    <!-- лента -->
    <div class="messages-feed" id="messagesFeed"></div>

    <!-- подвал -->
    <div class="forum-footer">
        <i class="fas fa-crown" style="color: gold;"></i> SRS forum · жирный, код, цитаты, загрузка фото
    </div>
</div>

<script>
    (function(){
        const STORAGE_KEY = 'srs_forum_messages';
        let messages = [];
        let currentFilter = 'all';
        let currentUserId = localStorage.getItem('srs_user_fingerprint') || 'user_' + Math.random().toString(36).substring(2, 10) + Date.now();
        localStorage.setItem('srs_user_fingerprint', currentUserId);

        // Текущая загруженная картинка (base64)
        let currentImageBase64 = null;

        // Загрузка
        function loadMessages() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { messages = JSON.parse(stored); } catch { messages = []; }
            } else { messages = []; }
            messages = messages.map(msg => {
                if (!msg.id) msg.id = 'msg_' + Date.now() + Math.random();
                if (msg.likes === undefined) msg.likes = 0;
                if (!msg.authorId) msg.authorId = 'unknown';
                if (msg.pinned === undefined) msg.pinned = false;
                if (!msg.image) msg.image = null; // для старых записей
                return msg;
            });
            updateStats();
            applyFilter();
        }

        function saveMessages() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalMessages').innerText = messages.length;
            document.getElementById('onlineCount').innerText = Math.floor(280 + Math.random() * 80);
        }

        // Парсинг текста с форматированием
        function parseMarkdown(text) {
            if (!text) return '';
            // Жирный: **текст**
            let parsed = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Моноширный: `код`
            parsed = parsed.replace(/`(.*?)`/g, '<code>$1</code>');
            // Цитата: > текст (на отдельной строке или в начале строки)
            parsed = parsed.replace(/^&gt;(.*)/gm, '<blockquote>$1</blockquote>');
            parsed = parsed.replace(/\n&gt;(.*)/g, '<blockquote>$1</blockquote>');
            // переходы строк
            parsed = parsed.replace(/\n/g, '<br>');
            return parsed;
        }

        function renderMessages(filteredMessages) {
            const feed = document.getElementById('messagesFeed');
            if (!filteredMessages.length) {
                feed.innerHTML = `<div class="empty-forum"><i class="fas fa-pen-fancy"></i><p>Сообщений пока нет</p><div class="small-note">Напишите что-нибудь — и оно появится ✨</div></div>`;
                return;
            }

            const sorted = [...filteredMessages].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            let html = '';
            sorted.forEach(msg => {
                const date = new Date(msg.timestamp);
                const timeStr = date.toLocaleString('ru-RU', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
                const isAuthor = (msg.authorId === currentUserId);
                const authorBadge = isAuthor ? '<span class="badge-pro"><i class="fas fa-check"></i> это вы</span>' : '';

                // Форматируем текст сообщения (безопасно)
                const formattedText = parseMarkdown(msg.text || '');
                // Добавляем изображение, если есть
                const imageHtml = msg.image ? `<img src="${msg.image}" alt="загруженное изображение" onclick="window.open(this.src)">` : '';

                html += `
                <div class="message-card" data-id="${msg.id}">
                    <div class="message-header">
                        <div class="msg-avatar"><i class="fas fa-user-astronaut"></i></div>
                        <div>
                            <div class="msg-author">${msg.author} ${authorBadge}</div>
                            <div class="msg-time"><i class="far fa-clock"></i> ${timeStr}</div>
                        </div>
                    </div>
                    <div class="message-content">
                        ${formattedText}
                        ${imageHtml}
                    </div>
                    <div class="message-actions">
                        <button class="action-btn like" data-id="${msg.id}"><i class="fas fa-heart"></i> ${msg.likes || 0}</button>
                        ${isAuthor ? `<button class="action-btn delete" data-id="${msg.id}"><i class="fas fa-trash-alt"></i> удалить</button>` : ''}
                    </div>
                </div>`;
            });

            feed.innerHTML = html;

            document.querySelectorAll('.action-btn.like').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    likeMessage(btn.dataset.id);
                });
            });
            document.querySelectorAll('.action-btn.delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteMessage(btn.dataset.id);
                });
            });
        }

        function applyFilter() {
            let filtered = [];
            if (currentFilter === 'all') filtered = messages;
            else if (currentFilter === 'popular') filtered = messages.filter(m => m.likes > 2);
            else if (currentFilter === 'my') filtered = messages.filter(m => m.authorId === currentUserId);
            renderMessages(filtered);

            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (currentFilter === 'all') document.getElementById('filterAll').classList.add('active');
            if (currentFilter === 'popular') document.getElementById('filterPopular').classList.add('active');
            if (currentFilter === 'my') document.getElementById('filterMyPosts').classList.add('active');
        }

        function likeMessage(id) {
            const msg = messages.find(m => m.id === id);
            if (msg) { msg.likes = (msg.likes || 0) + 1; saveMessages(); applyFilter(); }
        }

        function deleteMessage(id) {
            messages = messages.filter(m => m.id !== id);
            saveMessages(); applyFilter();
        }

        function addMessage(text, imageBase64 = null) {
            if (!text.trim() && !imageBase64) return;
            const newMsg = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8),
                author: 'user_' + currentUserId.substring(0, 6),
                authorId: currentUserId,
                text: text || '',
                image: imageBase64, // сохраняем base64
                likes: 0,
                timestamp: new Date().toISOString(),
                pinned: false
            };
            messages.push(newMsg);
            saveMessages();
            applyFilter();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadMessages();

            // Отправка
            const sendBtn = document.getElementById('sendBtn');
            const input = document.getElementById('messageInput');
            sendBtn.addEventListener('click', () => {
                addMessage(input.value, currentImageBase64);
                input.value = '';
                // сброс картинки
                currentImageBase64 = null;
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('imagePreview').src = '#';
                document.getElementById('imageName').innerText = '';
            });
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendBtn.click(); } });

            // Форматирование: вставка тегов в поле
            function insertFormat(prefix, suffix) {
                const start = input.selectionStart;
                const end = input.selectionEnd;
                const text = input.value;
                const selected = text.substring(start, end);
                input.value = text.substring(0, start) + prefix + selected + suffix + text.substring(end);
                input.focus();
                input.setSelectionRange(start + prefix.length, end + prefix.length);
            }

            document.getElementById('formatBold').addEventListener('click', () => insertFormat('**', '**'));
            document.getElementById('formatCode').addEventListener('click', () => insertFormat('`', '`'));
            document.getElementById('formatBlockquote').addEventListener('click', () => insertFormat('>', ''));

            // Загрузка изображения
            document.getElementById('imageUpload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImageBase64 = event.target.result;
                    document.getElementById('imagePreview').src = currentImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('imageName').innerText = file.name;
                };
                reader.readAsDataURL(file);
            });

            // Фильтры
            document.getElementById('filterAll').addEventListener('click', () => { currentFilter = 'all'; applyFilter(); });
            document.getElementById('filterPopular').addEventListener('click', () => { currentFilter = 'popular'; applyFilter(); });
            document.getElementById('filterMyPosts').addEventListener('click', () => { currentFilter = 'my'; applyFilter(); });
        });
    })();
</script>
</body>
</html>
